<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<title>استعلام لجنة الاختبارات</title>

<style>
body{
font-family:'Tahoma',sans-serif;
margin:0;
background:linear-gradient(135deg,#eef6f2,#f7fbfd);
padding:30px;
}
.box{
max-width:850px;
margin:auto;
background:#fff;
padding:30px;
border-radius:18px;
box-shadow:0 8px 25px rgba(0,0,0,.12);
border-top:8px solid #3b8ea5;
}
.header{text-align:center;margin-bottom:25px}
.logo{max-width:260px;margin-bottom:10px}
h1,h2{color:#3b8ea5;margin:8px 0}
.subtitle{color:#82a93d;font-weight:bold}
input{
width:100%;
padding:14px;
font-size:18px;
border:2px solid #82a93d;
border-radius:10px;
box-sizing:border-box;
}
button{
background:#3b8ea5;
color:white;
border:none;
padding:12px 24px;
font-size:18px;
margin-top:12px;
border-radius:10px;
cursor:pointer;
}
button:hover{background:#2f7589}
table{
width:100%;
margin-top:20px;
border-collapse:collapse;
overflow:hidden;
border-radius:10px;
}
th{
background:#3b8ea5;
color:white;
}
td,th{border:1px solid #d9e4e8;padding:10px}
tr:nth-child(even){background:#f7fbfc}
</style>
